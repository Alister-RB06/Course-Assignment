<!DOCTYPE html>
<html>
<head>
    <title>Responsive Example</title>
    <style>
        
.box {
    width: 80%;
    max-width: 600px;
    margin: auto;
    border: 1px solid #ccc;
    padding: 16px;
}


p {
    font-size: 1.5rem;
}


h1 {
    
    text-align: center;
}


body {
    background-color: white;
}

@media (max-width: 768px) {
    body {
        background-color: lightblue;
    }
}
    </style>
</head>
<body>

    <h1>Responsive Heading</h1>

    <div class="box">
        <p>
            This is a paragraph using rem units. Resize the screen to see changes.
        </p>
    </div>

</body>
</html>
