<script>
    //push
    let arr = [1, 2, 3];

console.log("Original:", arr);

// PUSH 
arr.push(4);
console.log("After push:", arr); 
// POP 
arr.pop();
console.log("After pop:", arr); 

// UNSHIFT 
arr.unshift(0);
console.log("After unshift:", arr); 

// SHIFT
arr.shift();
console.log("After shift:", arr); 
</script>
