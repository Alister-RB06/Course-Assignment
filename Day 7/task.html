<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>
    <style>
        /* Element selector */
p {
    color: #555;
    line-height: 1.6;
}

/* Class selector: intro */
.intro {
    font-style: italic;
}

/* Class selector: highlight */
.highlight {
    background-color: #f0f8ff;
    padding: 8px;
}

/* ID selector: header */
#header {
    color: #2c3e50;
    font-size: 32px;
}

/* Class selector: box */
.box {
    border: 1px solid #ccc;
    padding: 16px;
}
    </style>
</head>
<body>

    <h1 id="header">Welcome to My Page</h1>

    <p>This is a normal paragraph.</p>

    <p class="intro">This is an intro paragraph.</p>

    <p class="highlight">This paragraph is highlighted.</p>

    <div class="box">
        <p>This paragraph is inside a box.</p>
    </div>

</body>
</html>
