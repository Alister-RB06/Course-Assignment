<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <style>
        
        .static{
            background-color: blueviolet;
            position: static;
            width:80px;
            height:50px;
        }
        .relative{
            background-color: cadetblue;
            position: relative;
            width:80px;
            height:50px;
            left: 200px;
            top: 100px;
        }
        .Absolute{
            position: absolute;
            width:80px;
            height:50px;
            background-color:red;
            top: 200px;
            right: 0;

        }
    </style>
</head>
<body>
    <!--postions-->
    <div class="container">
        <div class="static">static</div>
        <div class="relative">Relative</div>
        <div class="Absolute">Absolute</div>
       
    </div>
</body>
</html>
