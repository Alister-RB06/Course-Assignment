<!DOCTYPE html>
<html>
<head>
<title>CSS Styling Task</title>

<style>

/* 1. Colors */
.color-section{
    color: blue;
    border: 3px solid red;
    padding: 15px;
    margin: 20px;
}

/* 2. Backgrounds */
.background-section{
    background-color: lightyellow;
    background-image: url("/images/image\ copy\ 5.png");
    background-size: cover;
    padding: 20px;
    margin: 20px;
}

/* 3. Fonts */
.font-section{
    font-family: Arial, sans-serif;
    font-size: 22px;
    padding: 20px;
    margin: 20px;
    border: 2px solid black;
}

/* 4. Text Styles */
.textstyle-section{
    padding: 20px;
    margin: 20px;
    border: 2px solid purple;
}

.bold{
    font-weight: bold;
}

.italic{
    font-style: italic;
}

.underline{
    text-decoration: underline;
}

</style>

</head>

<body>

<h1>CSS Styling Examples</h1>

<!-- Colors -->
<div class="color-section">
<h2>Colors</h2>
<p>This text color is blue and the border color is red.</p>
</div>

<!-- Background -->
<div class="background-section">
<h2>Background</h2>
<p>This section has background color and background image.</p>
</div>

<!-- Fonts -->
<div class="font-section">
<h2>Fonts</h2>
<p>This text uses Arial font with larger font size.</p>
</div>

<!-- Text Styles -->
<div class="textstyle-section">
<h2>Text Styles</h2>
<p class="bold">This text is bold.</p>
<p class="italic">This text is italic.</p>
<p class="underline">This text is underlined.</p>
</div>

</body>
</html>
